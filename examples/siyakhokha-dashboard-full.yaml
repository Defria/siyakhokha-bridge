                {%- set boundary_cost = left * rates.a22 -%}
              {%- else -%}
                {%- set active_rate = rates.a32 -%}
                {%- set boundary_cost = left * rates.a32 -%}
              {%- endif -%}
              (Current-tier boundary cap value: R{{ '%.2f' | format(boundary * active_rate) }} incl VAT for {{ boundary }} kWh. Remaining to that boundary from now: {{ '%.2f' | format(left) }} kWh, estimated R{{ '%.2f' | format(boundary_cost) }} incl VAT.)
              Incl VAT rates: A.1.2 R{{ '%.4f' | format(rates.a12) }}/kWh · A.2.2 R{{ '%.4f' | format(rates.a22) }}/kWh · A.3.2 R{{ '%.4f' | format(rates.a32) }}/kWh · A.4.2 R{{ '%.4f' | format(rates.a42) }}/kWh.
            {%- else -%}
              Buying exactly {{ '%.2f' | format(left) }} kWh will bring you to the top of current tier boundary ({{ boundary }} kWh).
            {%- endif -%}
          {%- endif -%}
        icon: mdi:counter
