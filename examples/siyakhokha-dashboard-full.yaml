        secondary: >-
          {%- set m_raw = states('sensor.prepaid_purchased_kwh_month_calendar') -%}
          {%- set m = m_raw | float(0) -%}
          {%- set left_raw = states('sensor.prepaid_units_to_next_tier_month_calendar') -%}
