      - type: custom:mushroom-template-card
        primary: Prepaid estimate result
        secondary: >-
          {%- set rows = state_attr('sensor.latest_bill_amount', 'tariffs') | default([], true) -%}
          {%- set rates = namespace(a12=none, a22=none, a32=none, a42=none) -%}
          {%- for r in rows -%}
            {%- if r is mapping and (r.section | default('') == 'Residential A2 Non-Indigent') and (r.unit | default('') == 'R/kWh') -%}
              {%- if r.charge_or_block | default('') == 'A.1.2 Block' -%}{%- set rates.a12 = r.incl_vat | float(0) -%}
              {%- elif r.charge_or_block | default('') == 'A.2.2 Block' -%}{%- set rates.a22 = r.incl_vat | float(0) -%}
              {%- elif r.charge_or_block | default('') == 'A.3.2 Block' -%}{%- set rates.a32 = r.incl_vat | float(0) -%}
              {%- elif r.charge_or_block | default('') == 'A.4.2 Block' -%}{%- set rates.a42 = r.incl_vat | float(0) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {%- set mode = states('input_select.prepaid_estimate_start_tier') -%}
          {%- set units = states('input_number.prepaid_estimate_units_kwh') | float(0) -%}
          {%- set current_m = states('sensor.prepaid_purchased_kwh_month_calendar') | float(0) -%}
          {%- if mode == 'Current month position' -%}
            {%- set base = current_m -%}
          {%- elif mode == 'A.1.2 Block' -%}
            {%- set base = 0 -%}
          {%- elif mode == 'A.2.2 Block' -%}
            {%- set base = 50 -%}
          {%- elif mode == 'A.3.2 Block' -%}
            {%- set base = 600 -%}
          {%- else -%}
            {%- set base = 700 -%}
          {%- endif -%}
          {%- if rates.a12 is none or rates.a22 is none or rates.a32 is none or rates.a42 is none -%}
            Tariff rates unavailable. Refresh tariffs first.
          {%- else -%}
            {%- set ns = namespace(rem=units, pos=base, total=0, q12=0, q22=0, q32=0, q42=0) -%}
            {%- if ns.rem > 0 and ns.pos < 50 -%}
              {%- set q = [ns.rem, 50 - ns.pos] | min -%}
              {%- set ns.q12 = q -%}
              {%- set ns.total = ns.total + (q * rates.a12) -%}
              {%- set ns.pos = ns.pos + q -%}
              {%- set ns.rem = ns.rem - q -%}
            {%- endif -%}
            {%- if ns.rem > 0 and ns.pos < 600 -%}
              {%- set q = [ns.rem, 600 - ns.pos] | min -%}
              {%- set ns.q22 = q -%}
              {%- set ns.total = ns.total + (q * rates.a22) -%}
              {%- set ns.pos = ns.pos + q -%}
              {%- set ns.rem = ns.rem - q -%}
            {%- endif -%}
            {%- if ns.rem > 0 and ns.pos < 700 -%}
              {%- set q = [ns.rem, 700 - ns.pos] | min -%}
              {%- set ns.q32 = q -%}
              {%- set ns.total = ns.total + (q * rates.a32) -%}
              {%- set ns.pos = ns.pos + q -%}
              {%- set ns.rem = ns.rem - q -%}
            {%- endif -%}
            {%- if ns.rem > 0 -%}
              {%- set ns.q42 = ns.rem -%}
              {%- set ns.total = ns.total + (ns.rem * rates.a42) -%}
              {%- set ns.pos = ns.pos + ns.rem -%}
              {%- set ns.rem = 0 -%}
            {%- endif -%}
            Estimated cost: R{{ '%.2f' | format(ns.total) }} incl VAT for {{ '%.2f' | format(units) }} kWh. Estimated month total after purchase: {{ '%.2f' | format(base + units) }} kWh. Breakdown: A.1.2 {{ '%.2f' | format(ns.q12) }} kWh · A.2.2 {{ '%.2f' | format(ns.q22) }} kWh · A.3.2 {{ '%.2f' | format(ns.q32) }} kWh · A.4.2 {{ '%.2f' | format(ns.q42) }} kWh.
          {%- endif -%}
        icon: mdi:calculator-variant
        multiline_secondary: true
        fill_container: true
        tap_action:
          action: none
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.35) !important;
              backdrop-filter: blur(8px);
              border: 1px solid rgba(255,255,255,0.06);
            }

      - type: markdown
        content: >-
          <em>Type the exact units you bought (e.g. 100.36). The tracker automation adds it to lifetime/month totals, then resets this field to 0.</em>
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.35) !important;
              backdrop-filter: blur(8px);
              border: 1px solid rgba(255,255,255,0.06);
