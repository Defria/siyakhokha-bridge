              {% if account_override is match('^[0-9]+$') and (account_override | int(0)) > 0 %}
                {% set account_final = account_override | int(0) %}
                {% set account_source = 'override' %}
              {% elif account_selected_id is match('^[0-9]+$') and (account_selected_id | int(0)) > 0 %}
