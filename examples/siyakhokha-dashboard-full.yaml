  - theme: Backend-selected
    title: Debug Siyakhokha
    path: siyakhokha-debug
    type: sidebar
    badges: []
    cards:
      - type: custom:mushroom-chips-card
        chips:
          - type: back
        card_mod:
          style: |
            ha-card { background: none !important; }

      - type: custom:mushroom-title-card
        title: 🛠️ Debug Siyakhokha
        subtitle: Integration diagnostics and latest submit response

      - type: entities
        title: Submit Diagnostics
        show_header_toggle: false
        entities:
          - entity: sensor.last_batch_submit_status
            name: Last batch submit status
          - entity: sensor.latest_bill_amount
            name: Bills source sensor
            secondary_info: last-updated
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.35) !important;
              backdrop-filter: blur(8px);
              border: 1px solid rgba(255,255,255,0.06);
            }

      - type: markdown
        content: >-
          ## Last Batch Submit Response

          {% set d = state_attr('sensor.last_batch_submit_status', 'last_batch_submit_response') | default({}, true) %}
          {% if d %}
          <table width="100%" border=0>
            <tbody>
            <tr>
              <td align="left"><b>Field</b></td>
              <td align="left"><b>Value</b></td>
            </tr>
            <tr>
              <td align="left">Status</td>
              <td align="left">{% set s = d.status | default('unknown') %}{% if s == 'submitted' %}🟢{% elif s == 'failed' %}🔴{% else %}⚪{% endif %} {{ s }}</td>
            </tr>
            <tr>
              <td align="left">Submitted at</td>
              <td align="left">{{ d.submitted_at | default('n/a') }}</td>
            </tr>
            <tr>
              <td align="left">Account(s)</td>
              <td align="left">{% if d.request is mapping %}{% if d.request.account_numbers is defined %}{{ d.request.account_numbers | default(['—']) | join(', ') }}{% elif d.request.account_id is defined %}{{ d.request.account_id }}{% else %}—{% endif %}{% else %}—{% endif %}</td>
            </tr>
            <tr>
              <td align="left">Amount(s)</td>
              <td align="left">{% if d.request is mapping %}{% if d.request.amounts is defined and (d.request.amounts | count > 0) %}{% for a in d.request.amounts %}R{{ '%.2f' | format(a | float(0)) }}{% if not loop.last %}, {% endif %}{% endfor %}{% elif d.request.amount is defined %}R{{ '%.2f' | format(d.request.amount | float(0)) }}{% else %}—{% endif %}{% else %}—{% endif %}</td>
            </tr>
            <tr>
              <td align="left">Mode</td>
              <td align="left">{% if d.request is mapping and d.request.dry_run is defined %}{% if d.request.dry_run %}🧪 Dry Run{% else %}🚀 Live Submit{% endif %}{% else %}—{% endif %}</td>
            </tr>
            <tr>
              <td align="left">Single Debit IDs</td>
              <td align="left">{% if d.request is mapping or d is mapping %}Bank {{ (d.request.bank_account_id if d.request is mapping else none) | default((d.request.resolved_bank_account_id if d.request is mapping else none), true) | default((d.resolved_context.bank_account_id if d.resolved_context is mapping else none), true) | default(d.resolved_bank_account_id, true) | default(d.bank_account_id, true) | default('—', true) }} · Account {{ (d.request.account_id if d.request is mapping else none) | default((d.request.resolved_account_id if d.request is mapping else none), true) | default((d.resolved_context.account_id if d.resolved_context is mapping else none), true) | default(d.resolved_account_id, true) | default(d.account_id, true) | default('—', true) }}{% else %}—{% endif %}</td>
            </tr>
            <tr>
              <td align="left">Response OK</td>
              <td align="left">{% if d.response is mapping %}{% if d.response.ok | default(false) %}✅ Yes{% else %}❌ No{% endif %}{% else %}—{% endif %}</td>
            </tr>
            <tr>
              <td align="left">Response Valid</td>
              <td align="left">{% if d.response is mapping and d.response.json is mapping %}{% if d.response.json.isValid | default(false) %}✅ Yes{% else %}❌ No{% endif %}{% else %}—{% endif %}</td>
            </tr>
            <tr>
              <td align="left">Response Path</td>
              <td align="left">{% if d.response is mapping %}{{ d.response.path | default('—') }}{% else %}—{% endif %}</td>
            </tr>
            </tbody>
          </table>
          {% else %}
          <p><em>No batch submit response captured yet.</em></p>
          {% endif %}
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.35) !important;
              backdrop-filter: blur(8px);
              border: 1px solid rgba(255,255,255,0.06);
              border-left: 3px solid #FF9800;
            }
            table { width: 100%; border-collapse: collapse; }
            table tr { border-bottom: 1px solid rgba(255,255,255,0.06); }
            table tr:first-child { border-bottom: 2px solid rgba(255,255,255,0.15); }
            table td { padding: 8px 10px; font-size: 0.9em; }
            table tr:first-child td { color: rgba(255,255,255,0.6); font-size: 0.85em; font-weight: 600; padding-bottom: 10px; }
            table tr:hover { background: rgba(255,255,255,0.03); }

      - type: markdown
        content: >-
          ## API Read Debug

          {% set ph = state_attr('sensor.latest_bill_amount', 'payment_history') | default({}, true) %}
          {% set do = state_attr('sensor.latest_bill_amount', 'debit_orders') | default({}, true) %}
          {% set bo = state_attr('sensor.latest_bill_amount', 'batch_orders') | default({}, true) %}
          {% set ph_count = (ph.get('data', []) if ph is mapping else []) | count %}
          {% set do_count = (do.get('data', []) if do is mapping else []) | count %}
          {% set bo_count = (bo.get('data', []) if bo is mapping else []) | count %}

          <table width="100%" border=0>
          <tbody>
          <tr>
          <td align="left"><b>Data Source</b></td>
          <td align="center"><b>Rows</b></td>
          <td align="center"><b>Status</b></td>
          </tr>
          <tr>
          <td align="left">Payment History</td>
          <td align="center">{{ ph_count }}</td>
          <td align="center">{% if ph_count > 0 %}🟢{% else %}⚪{% endif %}</td>
          </tr>
          <tr>
          <td align="left">Debit Orders</td>
          <td align="center">{{ do_count }}</td>
          <td align="center">{% if do_count > 0 %}🟢{% else %}⚪{% endif %}</td>
          </tr>
          <tr>
          <td align="left">Batch Orders</td>
          <td align="center">{{ bo_count }}</td>
          <td align="center">{% if bo_count > 0 %}🟢{% else %}⚪{% endif %}</td>
          </tr>
          </tbody>
          </table>
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.35) !important;
              backdrop-filter: blur(8px);
              border: 1px solid rgba(255,255,255,0.06);
              border-left: 3px solid #2196F3;
            }
            table { width: 100%; border-collapse: collapse; }
            table tr { border-bottom: 1px solid rgba(255,255,255,0.06); }
            table tr:first-child { border-bottom: 2px solid rgba(255,255,255,0.15); }
            table td { padding: 8px 10px; font-size: 0.9em; }
            table tr:first-child td { color: rgba(255,255,255,0.6); font-size: 0.85em; font-weight: 600; padding-bottom: 10px; }
            table tr:hover { background: rgba(255,255,255,0.03); }
