views:
  - theme: Backend-selected
    title: Siyakhokha
    path: siyakhokha
    badges: []
    cards:
      - type: custom:mushroom-chips-card
        chips:
          - type: back
        card_mod:
          style: |
            ha-card { background: none !important; }

      - type: custom:mushroom-template-card
        primary: >-
          {% set amount = states('sensor.latest_bill_amount') | float(0) %}
          {% if amount < 0 %}
            💰 Credit Balance · R{{ (amount | abs) | round(2) }}
          {% elif amount == 0 %}
            ✅ Account Settled
          {% else %}
            📄 Amount Due · R{{ amount | round(2) }}
          {% endif %}
        secondary: >-
          {% set date = states('sensor.latest_bill_date') %}
          {% set count = state_attr('sensor.latest_bill_amount', 'bill_count_loaded') | int(0) %}
          {% set acct = state_attr('sensor.latest_bill_amount', 'account_number') | default('—') %}
          Account {{ acct }} · Bill date: {{ date }} · {{ count }} bill(s) loaded
        icon: >-
          {% set amount = states('sensor.latest_bill_amount') | float(0) %}
          {% if amount < 0 %}mdi:cash-plus
          {% elif amount == 0 %}mdi:check-circle
          {% else %}mdi:cash-clock
          {% endif %}
        entity: sensor.latest_bill_amount
        fill_container: true
        multiline_secondary: true
        badge_icon: >-
          {% set amount = states('sensor.latest_bill_amount') | float(0) %}
          {% if amount < 0 %}mdi:arrow-down-bold-circle
          {% elif amount == 0 %}mdi:check-decagram
          {% else %}mdi:alert-circle
          {% endif %}
        badge_color: >-
          {% set amount = states('sensor.latest_bill_amount') | float(0) %}
          {% if amount < 0 %}green
          {% elif amount == 0 %}green
          {% else %}red
          {% endif %}
        color: >-
          {% set amount = states('sensor.latest_bill_amount') | float(0) %}
          {% if amount < 0 %}green
          {% elif amount == 0 %}cyan
          {% else %}red
          {% endif %}
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.4) !important;
              backdrop-filter: blur(10px);
              border: 1px solid rgba(255,255,255,0.08);
            }

      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: template
            icon: mdi:currency-zar
            icon_color: >-
              {% set amount = states('sensor.latest_bill_amount') | float(0) %}
              {% if amount < 0 %}green{% elif amount == 0 %}cyan{% else %}red{% endif %}
            content: >-
              {% set amount = states('sensor.latest_bill_amount') | float(0) %}
              {% if amount < 0 %}Credit R{{ (amount | abs) | round(2) }}
              {% elif amount == 0 %}R0.00
              {% else %}Due R{{ amount | round(2) }}
              {% endif %}
            entity: sensor.latest_bill_amount
          - type: template
            icon: mdi:calendar
            icon_color: cyan
            content: '{{ states("sensor.latest_bill_date") }}'
            entity: sensor.latest_bill_date
          - type: template
            icon: mdi:file-document-multiple
            icon_color: blue
            content: >-
              {{ state_attr('sensor.latest_bill_amount', 'bill_count_loaded') | int(0) }} loaded
            entity: sensor.latest_bill_amount
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.3) !important;
              backdrop-filter: blur(8px);
              border: 1px solid rgba(255,255,255,0.06);
              border-radius: 12px !important;
              padding: 4px 0;
            }

      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Actions
            card_mod:
              style: |
                ha-card { background: none !important; }
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Refresh Bills
                secondary: Fetch latest from Siyakhokha
                icon: mdi:refresh
                entity: button.refresh_bills
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.refresh_bills
                  confirmation:
                    text: Refresh bills from Siyakhokha portal?
                color: cyan
                card_mod:
                  style: |
                    ha-card {
                      background: rgba(0,0,0,0.35) !important;
                      backdrop-filter: blur(8px);
                      border: 1px solid rgba(255,255,255,0.06);
                    }
              - type: custom:mushroom-template-card
                primary: Open Graphs
                secondary: Year trends and charts
                icon: mdi:chart-bar
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-siyakhokha/siyakhokha-graphs
                color: teal
                card_mod:
                  style: |
                    ha-card {
                      background: rgba(0,0,0,0.35) !important;
                      backdrop-filter: blur(8px);
                      border: 1px solid rgba(255,255,255,0.06);
                    }

      - type: custom:mushroom-template-card
        primary: PDF Status
        secondary: >-
          {% if states('sensor.latest_bill_pdf_url') not in ['unknown', 'unavailable', 'None', ''] %}
            Downloadable PDF bills are available in Bill History.
          {% else %}
            No downloadable PDF bill is currently available.
          {% endif %}
        icon: >-
          {% if states('sensor.latest_bill_pdf_url') not in ['unknown', 'unavailable', 'None', ''] %}mdi:file-check{% else %}mdi:file-alert-outline{% endif %}
        color: >-
          {% if states('sensor.latest_bill_pdf_url') not in ['unknown', 'unavailable', 'None', ''] %}green{% else %}amber{% endif %}
        tap_action:
          action: none
        hold_action:
          action: none
        double_tap_action:
          action: none
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.35) !important;
              backdrop-filter: blur(8px);
              border: 1px solid rgba(255,255,255,0.06);
              border-left: 3px solid rgba(76,175,80,0.8);
            }

      - type: markdown
        content: >-
          ## Bill History

          {% set bills = state_attr('sensor.latest_bill_amount', 'bills') | default([]) %}
          {% set total = state_attr('sensor.latest_bill_amount', 'total') | int(0) %}
          {% if bills | length == 0 %}
          <p><em>No bills loaded yet. Tap Refresh Bills above.</em></p>
          {% else %}
          <p><em>Showing {{ bills|length }} bill(s){% if total > 0 %} of {{ total }} total{% endif %}.</em></p>
          <table width="100%" border=0>
            <tbody>
            <tr>
              <td align="left"><b>#</b></td>
              <td align="left"><b>Date</b></td>
              <td align="right"><b>Amount</b></td>
              <td align="center"><b>Local Pdf</b></td>
              <td align="center"><b>Portal Pdf</b></td>
            </tr>
            {% for bill in bills %}
            <tr>
              <td align="left">{{ loop.index }}</td>
              <td align="left">{{ bill.BillDate | default('—') }}</td>
              <td align="right">{% set amt = bill.BillAmount | default(0) | float(0) %}{% if amt < 0 %}<font color="#4CAF50"><b>R{{ amt | round(2) }}</b></font>{% elif amt == 0 %}<font color="#999999"><b>R0.00</b></font>{% else %}<font color="#EF5350"><b>R{{ amt | round(2) }}</b></font>{% endif %}</td>
              <td align="center">{% if bill.DownloadAvailable | default(false) %}<a href="{{ bill.LocalPdfUrl | default(bill.HaPdfUrl) }}" target="_blank" rel="noopener" download>View</a>{% else %}—{% endif %}</td>
              <td align="center">{% if bill.DownloadAvailable | default(false) and bill.PortalPdfUrl %}<a href="{{ bill.PortalPdfUrl }}" target="_blank" rel="noopener">Open</a>{% else %}—{% endif %}</td>
            </tr>
            {% endfor %}
            </tbody>
          </table>
          {% endif %}
        card_mod:
          style:
            ha-markdown$: |
              a {
                color: #ffffff !important;
                text-decoration: none !important;
                font-weight: 600;
              }
              a:hover {
                text-decoration: underline !important;
                color: #ffffff !important;
              }
              table {
                width: 100%;
                border-collapse: collapse;
              }
              table tr {
                border-bottom: 1px solid rgba(255,255,255,0.06);
              }
              table tr:first-child {
                border-bottom: 2px solid rgba(255,255,255,0.15);
              }
              table td {
                padding: 8px 10px;
                font-size: 0.9em;
              }
              table tr:first-child td {
                color: rgba(255,255,255,0.6);
                font-size: 0.85em;
                font-weight: 600;
                padding-bottom: 10px;
              }
              table tr:hover {
                background: rgba(255,255,255,0.03);
              }
            .: |
              ha-card {
                background: rgba(0,0,0,0.35) !important;
                backdrop-filter: blur(8px);
                border: 1px solid rgba(255,255,255,0.06);
                border-left: 3px solid #2196F3;
              }

      - type: markdown
        content: >-
          ## Latest Bill Details

          {% set bills = state_attr('sensor.latest_bill_amount', 'bills') | default([]) %}
          {% if bills | length > 0 %}
          {% set b = bills[0] %}
          <table width="100%" border=0>
            <tbody>
            <tr>
              <td align="left"><b>Field</b></td>
              <td align="left"><b>Value</b></td>
            </tr>
            <tr>
              <td align="left">Bill Date</td>
              <td align="left">{{ b.BillDate | default('—') }}</td>
            </tr>
            <tr>
              <td align="left">Bill Amount</td>
              <td align="left">{% set amt = b.BillAmount | default(0) | float(0) %}{% if amt < 0 %}<font color="#4CAF50"><b>Credit R{{ amt | round(2) }}</b></font>{% elif amt == 0 %}<font color="#999999"><b>Settled R0.00</b></font>{% else %}<font color="#EF5350"><b>Due R{{ amt | round(2) }}</b></font>{% endif %}</td>
            </tr>
            <tr>
              <td align="left">Download Available</td>
              <td align="left">{% if b.DownloadAvailable | default(false) %}Yes{% else %}No{% endif %}</td>
            </tr>
            {% if b.DownloadAvailable | default(false) %}
            <tr>
              <td align="left">View PDF</td>
              <td align="left"><a href="{{ b.LocalPdfUrl | default(b.HaPdfUrl) }}" target="_blank">View</a></td>
            </tr>
            <tr>
              <td align="left">Download PDF</td>
              <td align="left"><a href="{{ b.LocalPdfUrl | default(b.HaPdfUrl) }}" target="_blank" rel="noopener">Download</a></td>
            </tr>
            {% if b.PortalPdfUrl %}
            <tr>
              <td align="left">Portal Link</td>
              <td align="left"><a href="{{ b.PortalPdfUrl }}" target="_blank">Open</a></td>
            </tr>
            {% endif %}
            {% endif %}
            </tbody>
          </table>
          {% else %}
          <p><em>No bill data available.</em></p>
          {% endif %}
        card_mod:
          style:
            ha-markdown$: |
              a {
                color: #ffffff !important;
                text-decoration: none !important;
                font-weight: 600;
              }
              a:hover {
                text-decoration: underline !important;
                color: #ffffff !important;
              }
              table {
                width: 100%;
                border-collapse: collapse;
              }
              table tr {
                border-bottom: 1px solid rgba(255,255,255,0.06);
              }
              table tr:first-child {
                border-bottom: 2px solid rgba(255,255,255,0.15);
              }
              table td {
                padding: 8px 10px;
                font-size: 0.9em;
              }
              table tr:first-child td {
                color: rgba(255,255,255,0.6);
                font-size: 0.85em;
                font-weight: 600;
                padding-bottom: 10px;
              }
              table tr:hover {
                background: rgba(255,255,255,0.03);
              }
            .: |
              ha-card {
                background: rgba(0,0,0,0.35) !important;
                backdrop-filter: blur(8px);
                border: 1px solid rgba(255,255,255,0.06);
                border-left: 3px solid #FF9800;
              }

      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Account Info
            card_mod:
              style: |
                ha-card { background: none !important; }
          - type: glance
            show_name: true
            show_icon: true
            show_state: true
            columns: 2
            card_mod:
              style: |
                ha-card {
                  background: rgba(0,0,0,0.35) !important;
                  backdrop-filter: blur(8px);
                  border: 1px solid rgba(255,255,255,0.06);
                }
            entities:
              - entity: sensor.latest_bill_amount
                name: Bill Amount
                icon: mdi:currency-zar
              - entity: sensor.latest_bill_date
                name: Bill Date
                icon: mdi:calendar-month

  - theme: Backend-selected
    title: Siyakhokha Graphs
    path: siyakhokha-graphs
    type: sidebar
    badges: []
    cards:
      - type: custom:mushroom-title-card
        title: "📊 Billing Analytics"
        subtitle: Yearly trends and billing history

      - type: entities
        title: Chart Controls
        show_header_toggle: false
        entities:
          - entity: input_select.siyakhokha_bill_year
            name: Selected year
            icon: mdi:calendar-range
          - entity: sensor.latest_bill_amount
            name: Data source
            secondary_info: last-updated
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.35) !important;
              backdrop-filter: blur(8px);
              border: 1px solid rgba(255,255,255,0.06);
            }

      - type: markdown
        content: >-
          ## Year Summary

          {% set bills = state_attr('sensor.latest_bill_amount', 'bills') | default([]) %}
          {% set selected = states('input_select.siyakhokha_bill_year') | string %}
          {% set year_bills = bills | selectattr('BillDate', 'match', '^' ~ selected ~ '-') | list %}
          {% set amounts = year_bills | map(attribute='BillAmount') | map('float') | list %}
          {% set total = amounts | sum if amounts | length > 0 else 0 %}
          {% set avg = (total / (amounts | length)) | round(2) if amounts | length > 0 else 0 %}
          {% set highest = amounts | max if amounts | length > 0 else 0 %}
          {% set lowest = amounts | min if amounts | length > 0 else 0 %}

          <table width="100%" border=0>
            <tbody>
            <tr>
              <td align="center"><b>📊 Total</b></td>
              <td align="center"><b>📈 Average</b></td>
              <td align="center"><b>🔺 Highest</b></td>
              <td align="center"><b>🔻 Lowest</b></td>
            </tr>
            <tr>
              <td align="center">{% if total < 0 %}🟢{% elif total == 0 %}⚪{% else %}🔴{% endif %} R{{ total | round(2) }}</td>
              <td align="center">R{{ avg }}</td>
              <td align="center">🔴 R{{ highest | round(2) }}</td>
              <td align="center">{% if lowest < 0 %}🟢{% else %}⚪{% endif %} R{{ lowest | round(2) }}</td>
            </tr>
            </tbody>
          </table>

          <p><em>{{ amounts | length }} bill(s) in {{ selected }}</em></p>
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.35) !important;
              backdrop-filter: blur(8px);
              border: 1px solid rgba(255,255,255,0.06);
              border-left: 3px solid #FF9800;
            }
            table { width: 100%; border-collapse: collapse; }
            table tr { border-bottom: 1px solid rgba(255,255,255,0.06); }
            table tr:first-child { border-bottom: 2px solid rgba(255,255,255,0.15); }
            table td { padding: 10px 8px; font-size: 0.9em; }
            table tr:first-child td { color: rgba(255,255,255,0.6); font-size: 0.8em; font-weight: 600; }

      - type: markdown
        content: >-
          ## Monthly Bills (Selected Year)

          {% set bills = state_attr('sensor.latest_bill_amount', 'bills') | default([]) %}
          {% set selected = states('input_select.siyakhokha_bill_year') | int(0) %}
          {% set current_year = now().year | int %}
          {% set end_month = 12 if selected != current_year else (now().month | int - 1) %}
          {% set months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'] %}
          {% set ns = namespace(vals=[]) %}
          {% for i in range(1, end_month + 1) %}
            {% set mm = '%02d'|format(i) %}
            {% set rows = bills | selectattr('BillDate', 'match', '^' ~ selected ~ '-' ~ mm ~ '-') | list %}
            {% set amt = rows | map(attribute='BillAmount') | map('float') | sum %}
            {% set ns.vals = ns.vals + [amt] %}
          {% endfor %}

          {% set max_abs = ns.vals | map('abs') | max if ns.vals|length > 0 else 1 %}
          {% set max_abs = max_abs if max_abs > 0 else 1 %}
          {% if ns.vals | length == 0 %}
            - No billed months available yet for {{ selected }}.
          {% endif %}
          {% for idx in range(0, ns.vals | length) %}
            {% set v = ns.vals[idx] %}
            {% set blocks = ((v | abs) / max_abs * 15) | round(0) | int %}
            {% set bar = '🟩' if v < 0 else ('⬜' if v == 0 else '🟥') %}
            - **{{ months[idx] }}**: {% if v < 0 %}🟢{% elif v == 0 %}⚪{% else %}🔴{% endif %} `R{{ v | round(2) }}` {{ bar * blocks }}
          {% endfor %}
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.35) !important;
              backdrop-filter: blur(8px);
              border: 1px solid rgba(255,255,255,0.06);
            }

      - type: markdown
        content: >-
          ## Cumulative Trend (Selected Year)

          {% set bills = state_attr('sensor.latest_bill_amount', 'bills') | default([]) %}
          {% set selected = states('input_select.siyakhokha_bill_year') | int(0) %}
          {% set current_year = now().year | int %}
          {% set end_month = 12 if selected != current_year else (now().month | int - 1) %}
          {% set months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'] %}
          {% set ns = namespace(run=0, vals=[]) %}
          {% for i in range(1, end_month + 1) %}
            {% set mm = '%02d'|format(i) %}
            {% set rows = bills | selectattr('BillDate', 'match', '^' ~ selected ~ '-' ~ mm ~ '-') | list %}
            {% set amt = rows | map(attribute='BillAmount') | map('float') | sum %}
            {% set ns.run = ns.run + amt %}
            {% set ns.vals = ns.vals + [ns.run] %}
          {% endfor %}
          {% set final = ns.vals[-1] if ns.vals|length > 0 else 0 %}
          {% set max_cum = ns.vals | map('abs') | max if ns.vals|length > 0 else 1 %}
          {% set max_cum = max_cum if max_cum > 0 else 1 %}

          {% if ns.vals | length == 0 %}
            - No billed months available yet for {{ selected }}.
          {% endif %}
          {% for idx in range(0, ns.vals | length) %}
            {% set v = ns.vals[idx] %}
            {% set blocks = ((v | abs) / max_cum * 12) | round(0) | int %}
            - **{{ months[idx] }}**: `R{{ v | round(0) | int }}` {{ '▓' * blocks }}{{ '░' * (12 - blocks) }}
          {% endfor %}

          ---

          **Selected year:** {{ selected }}
          · **Cumulative total:** {% if final < 0 %}🟢{% elif final == 0 %}⚪{% else %}🔴{% endif %} **R{{ final | round(2) }}**
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.35) !important;
              backdrop-filter: blur(8px);
              border: 1px solid rgba(255,255,255,0.06);
            }

      - type: markdown
        content: >-
          ## 📅 Year-over-Year

          {% set bills = state_attr('sensor.latest_bill_amount', 'bills') | default([]) %}
          {% set ns_years = namespace(years=[]) %}
          {% for b in bills %}
            {% set y = b.BillDate[:4] if b.BillDate is defined and b.BillDate | length >= 4 else '' %}
            {% if y != '' and y not in ns_years.years %}{% set ns_years.years = ns_years.years + [y] %}{% endif %}
          {% endfor %}
          {% set years = ns_years.years | sort %}

          {% if years | length == 0 %}

          *No data available.*

          {% else %}
          {% set ns_max = namespace(val=1) %}
          {% for y in years %}
            {% set yt = (bills | selectattr('BillDate', 'match', '^' ~ y ~ '-') | map(attribute='BillAmount') | map('float') | sum) | abs %}
            {% if yt > ns_max.val %}{% set ns_max.val = yt %}{% endif %}
          {% endfor %}

          <table width="100%" border=0>
            <tbody>
            <tr>
              <td align="left"><b>Year</b></td>
              <td align="left"><b>Bills</b></td>
              <td align="right"><b>Total</b></td>
              <td align="left"><b>Trend</b></td>
            </tr>
            {% for y in years | reverse %}
            {% set year_total = bills | selectattr('BillDate', 'match', '^' ~ y ~ '-') | map(attribute='BillAmount') | map('float') | sum %}
            {% set year_count = bills | selectattr('BillDate', 'match', '^' ~ y ~ '-') | list | length %}
            {% set blocks = ((year_total | abs) / (ns_max.val if ns_max.val > 0 else 1) * 10) | round(0) | int %}
            {% set is_sel = (y == states('input_select.siyakhokha_bill_year') | string) %}
            <tr>
              <td align="left">{% if is_sel %}**👉 {{ y }}**{% else %}{{ y }}{% endif %}</td>
              <td align="left">{{ year_count }}</td>
              <td align="right">{% if year_total < 0 %}🟢{% elif year_total == 0 %}⚪{% else %}🔴{% endif %} R{{ year_total | round(0) | int }}</td>
              <td align="left">{{ '█' * blocks }}</td>
            </tr>
            {% endfor %}
            </tbody>
          </table>
          {% endif %}
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.35) !important;
              backdrop-filter: blur(8px);
              border: 1px solid rgba(255,255,255,0.06);
              border-left: 3px solid #2196F3;
            }
            table { width: 100%; border-collapse: collapse; }
            table tr { border-bottom: 1px solid rgba(255,255,255,0.06); }
            table tr:first-child { border-bottom: 2px solid rgba(255,255,255,0.15); }
            table td { padding: 8px 10px; font-size: 0.9em; }
            table tr:first-child td { color: rgba(255,255,255,0.6); font-size: 0.85em; font-weight: 600; }
            table tr:hover { background: rgba(255,255,255,0.03); }

      - type: markdown
        content: >-
          ## Notes

          - Charts are filtered by **Selected year**.
          - Data comes directly from `sensor.latest_bill_amount` bill attributes.
          - If values look stale, press **Refresh Bills** on the main Siyakhokha tab.
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.35) !important;
              backdrop-filter: blur(8px);
              border: 1px solid rgba(255,255,255,0.06);
              border-left: 3px solid #00BCD4;
            }

  - theme: Backend-selected
    title: Siyakhokha Payments
    path: siyakhokha-payments
    type: sidebar
    badges: []
    cards:
      - type: custom:mushroom-chips-card
        chips:
          - type: back
        card_mod:
          style: |
            ha-card { background: none !important; }

      - type: custom:mushroom-title-card
        title: 💳 Payments
        subtitle: Payment history, debit orders and batch submission

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Payment History Rows
            secondary: >-
              {{ (state_attr('sensor.latest_bill_amount', 'payment_history') or {}).get('data', []) | count }} rows
            icon: mdi:history
            color: cyan
            tap_action:
              action: navigate
              navigation_path: '#siyakhokha-payment-history-rows'
          - type: custom:mushroom-template-card
            primary: Debit Orders Rows
            secondary: >-
              {{ (state_attr('sensor.latest_bill_amount', 'debit_orders') or {}).get('data', []) | count }} rows
            icon: mdi:bank-check
            color: teal
            tap_action:
              action: navigate
              navigation_path: '#siyakhokha-debit-orders-rows'

      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
