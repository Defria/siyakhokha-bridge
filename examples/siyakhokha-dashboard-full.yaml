          {%- set rows = state_attr('sensor.latest_bill_amount', 'tariffs') | default([], true) -%}
          {%- set rates = namespace(a12=none, a22=none, a32=none, a42=none) -%}
          {%- for r in rows -%}
            {%- if r is mapping and (r.section | default('') == 'Residential A2 Non-Indigent') and (r.unit | default('') == 'R/kWh') -%}
              {%- if r.charge_or_block | default('') == 'A.1.2 Block' -%}{%- set rates.a12 = r.incl_vat | float(0) -%}
              {%- elif r.charge_or_block | default('') == 'A.2.2 Block' -%}{%- set rates.a22 = r.incl_vat | float(0) -%}
              {%- elif r.charge_or_block | default('') == 'A.3.2 Block' -%}{%- set rates.a32 = r.incl_vat | float(0) -%}
              {%- elif r.charge_or_block | default('') == 'A.4.2 Block' -%}{%- set rates.a42 = r.incl_vat | float(0) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {%- if m_raw in ['unknown', 'unavailable', 'none', 'None', ''] -%}
            Waiting for monthly prepaid purchase tracker.
          {%- elif m > 700 -%}
            Current prepaid purchase tier: A.4.2 Block · Units before next tier: 0.00 kWh. You are already in A.4.2 (max tier) for this month.
          {%- else -%}
            {%- if m <= 50 -%}{%- set boundary = 50 -%}{%- elif m <= 600 -%}{%- set boundary = 600 -%}{%- else -%}{%- set boundary = 700 -%}{%- endif -%}
            Current prepaid purchase tier: {{ states('sensor.prepaid_purchase_tier_month_calendar') }} · Units before next tier: {{ '%.2f' | format(left) }} kWh
            {%- if rates.a12 is not none and rates.a22 is not none and rates.a32 is not none and rates.a42 is not none -%}
