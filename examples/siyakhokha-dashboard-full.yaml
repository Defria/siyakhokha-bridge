            }

      - type: markdown
        content: |
          ## Tariff Tables

          {% set rows = state_attr('sensor.latest_bill_amount', 'tariffs') | default([], true) %}
          {% set src = state_attr('sensor.latest_bill_amount', 'tariff_source') | default({}, true) %}
          {% set schedule = src.get('schedule', {}) if src is mapping else {} %}
          {% set month_raw = states('sensor.deye_summary_month_grid_import_buy') %}
          {% set month_kwh = month_raw | float(0) %}
          {% set block = namespace(active_a2='') %}
          {% if month_raw not in ['unknown', 'unavailable', 'none', 'None', ''] %}
          {% if month_kwh <= 50 %}
          {% set block.active_a2 = 'A.1.2 Block' %}
          {% elif month_kwh <= 600 %}
          {% set block.active_a2 = 'A.2.2 Block' %}
          {% elif month_kwh <= 700 %}
          {% set block.active_a2 = 'A.3.2 Block' %}
          {% else %}
          {% set block.active_a2 = 'A.4.2 Block' %}
          {% endif %}
          {% endif %}
          {% set ns = namespace(a=[], b=[], c=[]) %}
          {% for r in rows %}
          {% if r is mapping %}
          {% set t = r.tariff | default('') | string %}
          {% if t.startswith('A') %}
          {% set ns.a = ns.a + [r] %}
          {% elif t == 'B' %}
          {% set ns.b = ns.b + [r] %}
          {% elif t == 'C' %}
          {% set ns.c = ns.c + [r] %}
          {% endif %}
          {% endif %}
          {% endfor %}

          {% if rows | count == 0 %}
          <p><em>No tariff rows loaded yet. Press Refresh Tariffs.</em></p>
          {% else %}
          <p><em>{{ rows | count }} row(s) parsed · Source: {{ schedule.get('title', 'n/a') }}</em></p>

          <details open>
          <summary><b>Tariff A</b> — Residential + Small Business ({{ ns.a | count }} row(s))</summary>
          {% if block.active_a2 %}
          <p><em>Blue text marks your current Residential A2 active block (from month grid import).</em></p>
          {% endif %}
          <div class="tariff-scroll">
          <table class="tariff-table" width="100%" border=0>
          <tbody>
          <tr>
          <td align="left"><b>Section</b></td>
          <td align="left"><b>Charge / Block</b></td>
          <td align="left"><b>Range</b></td>
          <td align="left"><b>Unit</b></td>
          <td align="right"><b>Excl VAT</b></td>
          <td align="right"><b>Incl VAT</b></td>
          </tr>
          {% for r in ns.a %}
          {% set is_active_a2 = block.active_a2 and (r.section | default('') == 'Residential A2 Non-Indigent') and (r.charge_or_block | default('') == block.active_a2) and (r.unit | default('') == 'R/kWh') %}
          <tr>
          <td align="left">{% if is_active_a2 %}<font color="#64B5F6"><b>&#9656;&nbsp;{{ r.section | default('—') }}</b></font>{% else %}{{ r.section | default('—') }}{% endif %}</td>
          <td align="left">{% if is_active_a2 %}<font color="#64B5F6"><b>{{ r.charge_or_block | default('—') }}</b></font>{% else %}{{ r.charge_or_block | default('—') }}{% endif %}</td>
          <td align="left">{% if is_active_a2 %}<font color="#64B5F6"><b>{{ r.usage_range | default('—') }}</b></font>{% else %}{{ r.usage_range | default('—') }}{% endif %}</td>
          <td align="left">{% if is_active_a2 %}<font color="#64B5F6"><b>{{ r.unit | default('—') }}</b></font>{% else %}{{ r.unit | default('—') }}{% endif %}</td>
          <td align="right">{% if is_active_a2 %}<font color="#64B5F6"><b>{{ '%.4f' | format(r.excl_vat | float(0)) }}</b></font>{% else %}{{ '%.4f' | format(r.excl_vat | float(0)) }}{% endif %}</td>
          <td align="right">{% if is_active_a2 %}<font color="#64B5F6"><b>{{ '%.4f' | format(r.incl_vat | float(0)) }}</b></font>{% else %}{{ '%.4f' | format(r.incl_vat | float(0)) }}{% endif %}</td>
          </tr>
          {% endfor %}
          </tbody>
          </table>
          </div>
          </details>

          <details>
          <summary><b>Tariff B</b> — Residential ({{ ns.b | count }} row(s))</summary>
          <div class="tariff-scroll">
          <table class="tariff-table" width="100%" border=0>
          <tbody>
          <tr>
          <td align="left"><b>Section</b></td>
          <td align="left"><b>Charge / Block</b></td>
          <td align="left"><b>Range</b></td>
          <td align="left"><b>Unit</b></td>
          <td align="right"><b>Excl VAT</b></td>
          <td align="right"><b>Incl VAT</b></td>
          </tr>
          {% for r in ns.b %}
          <tr>
          <td align="left">{{ r.section | default('—') }}</td>
          <td align="left">{{ r.charge_or_block | default('—') }}</td>
          <td align="left">{{ r.usage_range | default('—') }}</td>
          <td align="left">{{ r.unit | default('—') }}</td>
          <td align="right">{{ '%.4f' | format(r.excl_vat | float(0)) }}</td>
          <td align="right">{{ '%.4f' | format(r.incl_vat | float(0)) }}</td>
          </tr>
          {% endfor %}
          </tbody>
          </table>
          </div>
          </details>

          <details>
          <summary><b>Tariff C</b> — Existing Customers ({{ ns.c | count }} row(s))</summary>
          <div class="tariff-scroll">
          <table class="tariff-table" width="100%" border=0>
          <tbody>
          <tr>
          <td align="left"><b>Section</b></td>
          <td align="left"><b>Charge / Block</b></td>
          <td align="left"><b>Range</b></td>
          <td align="left"><b>Unit</b></td>
          <td align="right"><b>Excl VAT</b></td>
          <td align="right"><b>Incl VAT</b></td>
          </tr>
          {% for r in ns.c %}
          <tr>
          <td align="left">{{ r.section | default('—') }}</td>
          <td align="left">{{ r.charge_or_block | default('—') }}</td>
          <td align="left">{{ r.usage_range | default('—') }}</td>
          <td align="left">{{ r.unit | default('—') }}</td>
          <td align="right">{{ '%.4f' | format(r.excl_vat | float(0)) }}</td>
          <td align="right">{{ '%.4f' | format(r.incl_vat | float(0)) }}</td>
          </tr>
          {% endfor %}
          </tbody>
          </table>
          </div>
          </details>
          {% endif %}
        card_mod:
          style:
            ha-markdown$: |
              details {
                margin: 10px 0;
                padding: 6px 8px;
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 10px;
                background: rgba(255,255,255,0.02);
              }
              details[open] {
                background: rgba(255,255,255,0.035);
              }
              summary {
                cursor: pointer;
                color: rgba(255,255,255,0.92);
                font-size: 0.95em;
                font-weight: 600;
                padding: 2px 0;
              }
              .tariff-scroll {
                overflow-x: auto;
                margin-top: 8px;
                border-radius: 8px;
                border: 1px solid rgba(255,255,255,0.08);
                background: rgba(3,10,24,0.45);
              }
              .tariff-table {
                width: 100%;
                min-width: 980px;
                border-collapse: collapse;
                table-layout: fixed;
              }
              .tariff-table tr { border-bottom: 1px solid rgba(255,255,255,0.08); }
              .tariff-table tr:first-child { border-bottom: 2px solid rgba(255,255,255,0.2); }
              .tariff-table tr:nth-child(even):not(:first-child) { background: rgba(255,255,255,0.015); }
              .tariff-table td { padding: 9px 10px; font-size: 0.9em; vertical-align: top; }
              .tariff-table tr:first-child td {
                color: rgba(255,255,255,0.72);
                font-size: 0.83em;
                font-weight: 700;
                letter-spacing: 0.01em;
                text-transform: uppercase;
                position: sticky;
                top: 0;
                z-index: 2;
                background: rgba(16,24,41,0.96);
              }
              .tariff-table td:nth-child(1) { width: 29%; }
              .tariff-table td:nth-child(2) { width: 26%; }
              .tariff-table td:nth-child(3) { width: 16%; }
              .tariff-table td:nth-child(4) { width: 9%; }
              .tariff-table td:nth-child(5),
              .tariff-table td:nth-child(6) {
                width: 10%;
                font-variant-numeric: tabular-nums;
                font-family: "JetBrains Mono", "Fira Code", monospace;
              }
              .tariff-table tr:hover { background: rgba(255,255,255,0.04); }
            .: |
              ha-card {
                background: rgba(0,0,0,0.35) !important;
                backdrop-filter: blur(8px);
                border: 1px solid rgba(255,255,255,0.06);
                border-left: 3px solid #00BCD4;
              }

      - type: markdown
        content: |
          ## Plain-English Glossary

          <details>
          <summary><b>Residential A1 Indigent</b></summary>
          <p>
          This is a <b>support tariff</b> for households that are officially registered as low-income with the municipality.
          It usually gives better pricing at lower usage levels.
          </p>
          </details>

          <details>
          <summary><b>Residential A2 Non-Indigent</b></summary>
          <p>
          This is the <b>standard household tariff</b> for customers who are not on the municipality indigent register.
          Most households are typically billed on this type unless approved for indigent support.
          </p>
          </details>

          <details>
          <summary><b>Tariff Blocks (0-50, 50-600, etc.)</b></summary>
          <p>
          Electricity is charged in <b>steps</b> (called blocks), but how the step is determined
          depends on account type.
          </p>
          <p>
          <b>Postpaid:</b> blocks are generally applied from metered <b>consumption</b> in the billing period.<br>
          <b>Prepaid:</b> blocks are generally applied from cumulative <b>units purchased</b> in the calendar month
          (vending month), not only what has already been physically consumed.
          </p>
          </details>

          <details>
          <summary><b>Excl VAT vs Incl VAT</b></summary>
          <p>
          <b>Excl VAT</b> is the base tariff before tax. <b>Incl VAT</b> is what you actually pay after VAT is added.
          </p>
          </details>

          <details>
          <summary><b>Why the tariff can reset on the 1st</b></summary>
          <p>
          Block-based municipal tariffs are usually measured per calendar month.
          On day 1 of a new month, block tracking starts again from zero for that month.
          For prepaid customers this is typically tied to monthly units purchased.
          </p>
          </details>

          ---

          <b>Read the full official documents</b>

          {% set src = state_attr('sensor.latest_bill_amount', 'tariff_source') | default({}, true) %}
          {% set schedule = src.get('schedule', {}) if src is mapping else {} %}
          {% set schedule_url = schedule.get('url', '') %}

          {% if schedule_url %}
          - Latest Schedule detected by integration: <a href="{{ schedule_url }}" target="_blank" rel="noopener">Open latest Schedule 2 PDF</a>
          {% endif %}
          - Ekurhuleni document feed: <a href="https://www.ekurhuleni.gov.za/wp-json/wp/v2/dlp_document" target="_blank" rel="noopener">Open public document API</a>
          - Electricity tariff policy (Annexure E16): <a href="https://www.ekurhuleni.gov.za/wp-content/uploads/2025/07/Annexure-E16-Electricity-Tariff-Policy.pdf" target="_blank" rel="noopener">Open policy PDF</a>
        card_mod:
          style:
            ha-markdown$: |
              details {
                margin: 8px 0;
                padding: 6px 8px;
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 10px;
                background: rgba(255,255,255,0.02);
              }
              summary {
                cursor: pointer;
                color: rgba(255,255,255,0.92);
                font-size: 0.95em;
                font-weight: 600;
              }
              p {
                margin: 8px 0 2px 0;
                color: rgba(255,255,255,0.84);
                line-height: 1.45;
              }
              a {
                color: #8fd3ff !important;
                text-decoration: none !important;
